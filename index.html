<script>
(function(){
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const boldName = (authors)=> esc(authors);

  /* ----- Disclaimer banner ----- */
  const disc = $("#disclaimer");
  if (SITE.disclaimer) { disc.innerHTML = `<div class="inner">${esc(SITE.disclaimer)}</div>`; }
  else { disc.remove(); }

  /* ----- Left rail ----- */
  const linksHtml = SITE.links.map(l=>
    `<li><a href="${esc(l.url)}">${esc(l.label)}</a></li>`).join("");

  const fieldsHtml = (SITE.fields && SITE.fields.length)
    ? `<div class="rail-meta"><h3>Fields</h3><ul>${
        SITE.fields.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>` : "";

  const eduHtml = (SITE.education && SITE.education.length)
    ? `<div class="rail-meta"><h3>Education</h3><ul>${
        SITE.education.map(e=>`<li>${esc(e)}</li>`).join("")}</ul></div>` : "";

  // Build section nav from non-empty sections
  const sections = [
    {id:"about",      label:"About",            items:null},
    {id:"published",  label:"Published",        items:SITE.published},
    {id:"working",    label:"Working papers",   items:SITE.workingPapers},
    {id:"progress",   label:"Work in progress", items:SITE.workInProgress},
  ];
  const navHtml = sections
    .filter(s=> s.id==="about" || (s.items && s.items.length))
    .map(s=>`<a href="#${s.id}">${esc(s.label)}</a>`).join("");

  $("#rail").innerHTML = `
    <h1 class="rail-name">${esc(SITE.name)}</h1>
    <p class="rail-role">${esc(SITE.role)}</p>
    <p class="rail-aff">${esc(SITE.affiliation)}</p>
    <ul class="rail-links">${linksHtml}</ul>
    ${fieldsHtml}
    ${eduHtml}
    <nav class="rail-nav">${navHtml}</nav>
  `;

  /* ----- One reference ----- */
  function refHtml(p){
    const links = (p.links||[]).filter(l=>l.url && l.label)
      .map(l=>`<a href="${esc(l.url)}">${esc(l.label)}</a>`).join("");
    const venueBits = [p.venue, p.year].filter(Boolean).map(esc).join(" · ");
    return `
      <article class="ref">
        ${p.year ? `<span class="yr">${esc(p.year)}</span>`:""}
        <h3 class="ref-title">${esc(p.title)}</h3>
        <p class="ref-authors">${boldName(p.authors)}</p>
        ${venueBits ? `<p class="ref-venue">${venueBits}</p>`:""}
        ${p.abstract ? `<p class="ref-abstract">${esc(p.abstract)}</p>`:""}
        ${links ? `<div class="ref-links">${links}</div>`:""}
      </article>`;
  }

  /* ----- A research section ----- */
  function sectionHtml(id,title,items){
    if(!items || !items.length) return "";
    return `
      <section class="section" id="${id}">
        <div class="section-head">
          <h2>${esc(title)}</h2>
        </div>
        ${items.map(refHtml).join("")}
      </section>`;
  }

  const aboutHtml = `<div class="about">${
    SITE.about.split("\n\n").map(par=>`<p>${esc(par)}</p>`).join("")}</div>`;

  $("#content").innerHTML = `
    <div class="fade" id="about">
      ${aboutHtml}
    </div>
    ${sectionHtml("published","Published", SITE.published)}
    ${sectionHtml("working","Working papers", SITE.workingPapers)}
    ${sectionHtml("progress","Work in progress", SITE.workInProgress)}
  `;

  document.title = SITE.name;
})();
</script>
